<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seja Bem-Vindo</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./CSS/Global/globalStyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Jura:wght@300..700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div id="tudo">

        <div id="box-principal">

            <div id="box-direita">

                <div id="box-tojunfort">
                    <img src="./midia/Imagens/92885741-árvore-branca-no-fundo-preto-design-vetorial-e-elemento-gráfico-Picsart-BackgroundRemover.jpg" alt="">
                    <h1 class="fonte-josefin">ToJuntFort</h1>
                </div>

                <div id="box-mensagem-escolha">

                    <div id="box-mensagem">

                        <h1 class="fonte-josefin">
                            Olá! Seja bem vindo
                        </h1>

                        <h4 style="margin: 0; font-size: 25px; color: #3f3b3b" class="fonte-josefin">
                            :D
                        </h4>

                    </div>

                    <div id="box-escolha">

                        <h4 id="box-escolha-h4" class="fonte-josefin" style="color: #3f3b3b;">
                            Escolha abaixo um perfil para acessar
                        </h4>

                        <div class="escolhas" id="box-diretor">

                            <div id="texto-escolha-diretor">

                                <p class="texto fonte-josefin" style="font-size: 20px;">
                                    Sou
                                </p>

                                <p class="texto fonte-josefin" style="font-size: 30px; font-weight: bold;">
                                    Diretoria
                                </p>


                            </div>

                            <button id="botao-pag-diretoria" class="botao-escolhas">
                                <img class="img-botao"
                                    src="./Midia/Imagens/pngtree-arrow-right-flat-white-color-icon-ok-down-negative-vector-png-image_9756321-removebg-preview.png"
                                    alt="falhou.svg">
                            </button>

                        </div>


                        <div class="escolhas" id="box-voluntário">


                            <div id="texto-escolha-voluntario">

                                <p class="texto fonte-josefin" style="font-size: 20px;">
                                    Sou
                                </p>

                                <p class="texto fonte-josefin" style="font-size: 30px; font-weight: bold;">
                                    Voluntário
                                </p>


                            </div>



                            <button id="botao-pag-voluntario" class="botao-escolhas">
                                <img class="img-botao"
                                    src="./Midia/Imagens/pngtree-arrow-right-flat-white-color-icon-ok-down-negative-vector-png-image_9756321-removebg-preview.png"
                                    alt="falhou.jpg">
                            </button>


                        </div>

                    </div>

                    <div id="box-logos-etec">
                        <img class="imgs-logo" src="./midia/Imagens/Logo-Etecs-1200x800-1-Picsart-BackgroundRemover.jpg" alt="">
                    </div>

                </div>
            </div>

        </div>

    </div>

    <script src="./JS/Paginas/index/Navegacao.js"></script>
</body>

</html>
