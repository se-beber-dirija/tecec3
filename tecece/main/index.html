<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seja Bem-Vindo</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./CSS/Global/globalStyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Jura:wght@300..700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div id="tudo">

        <div id="box-principal">

            <div id="box-direita">

                <div id="box-tojunfort">
                    <img src="./midia/Imagens/92885741-árvore-branca-no-fundo-preto-design-vetorial-e-elemento-gráfico-Picsart-BackgroundRemover.jpg"
                        alt="">
                    <span class="fonte-josefin">ToJunFort</span>
                </div>

                <div id="box-mensagem-escolha">

                    <div id="box-mensagem">

                        <h1 class="fonte-josefin">
                            Olá! Seja bem vindo
                        </h1>

                    </div>

                    <div id="box-escolha">

                        <h4 id="box-escolha-h4" class="fonte-josefin" style="color: #3f3b3b;">
                            Escolha abaixo um perfil para acessar
                        </h4>

                        <div class="escolhas" id="box-diretor">

                            <div id="texto-escolha-diretor">

                                <p class="texto fonte-josefin" style="font-size: 20px;">
                                    Sou
                                </p>

                                <p class="texto fonte-josefin" style="font-size: 30px; font-weight: bold;">
                                    Diretoria
                                </p>


                            </div>

                            <button id="botao-pag-diretoria" class="botao-escolhas">

                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-arrow-right-icon lucide-arrow-right">
                                    <path d="M5 12h14" />
                                    <path d="m12 5 7 7-7 7" />
                                </svg>

                            </button>

                        </div>


                        <div class="escolhas" id="box-voluntário">

                            <div id="texto-escolha-voluntario">

                                <p class="texto fonte-josefin" style="font-size: 20px;">
                                    Sou
                                </p>

                                <p class="texto fonte-josefin" style="font-size: 30px; font-weight: bold;">
                                    Voluntário
                                </p>


                            </div>

                            <button id="botao-pag-voluntario" class="botao-escolhas">

                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-arrow-right-icon lucide-arrow-right">
                                    <path d="M5 12h14" />
                                    <path d="m12 5 7 7-7 7" />
                                </svg>
                                
                            </button>


                        </div>

                    </div>

                    <div id="box-logos-etec">
                        <img class="imgs-logo" src="./midia/Imagens/Logo-Etecs-1200x800-1-Picsart-BackgroundRemover.jpg"
                            alt="">
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="./JS/Paginas/index/Navegacao.js"></script>
</body>

</html>
